{% autoescape on %}<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="x-apple-disable-message-reformatting">
  <title>{{ subject }}</title>
</head>
<body style="margin:0; padding:0; width:100%; background-color:#f7f5ef; -webkit-text-size-adjust:100%; -ms-text-size-adjust:100%;">
  <!-- preheader: shows as preview text in the inbox, hidden in the body -->
  <div style="display:none; max-height:0; overflow:hidden; mso-hide:all; font-size:1px; line-height:1px; color:#f7f5ef; opacity:0;">{{ preheader }}</div>

  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#f7f5ef;">
    <tr>
      <td align="center" style="padding:32px 16px;">
        <table role="presentation" width="520" cellpadding="0" cellspacing="0" border="0" style="width:520px; max-width:100%;">

          <!-- logo -->
          <tr>
            <td align="center" style="padding:4px 0 28px;">
              <img src="{{ logo_url }}" alt="Anthea" width="132" style="display:block; width:132px; max-width:50%; height:auto; border:0; outline:none; text-decoration:none;">
            </td>
          </tr>

          <!-- card -->
          <tr>
            <td style="background-color:#ffffff; border:1px solid rgba(12,42,30,0.12); border-radius:6px; padding:40px 40px 36px;">

              <h1 style="margin:0 0 18px; font-family:Georgia,'Times New Roman',serif; font-size:24px; line-height:1.25; font-weight:normal; color:#0b3b29;">{{ heading }}</h1>

              {% for p in paragraphs %}
              <p style="margin:0 0 16px; font-family:Helvetica,Arial,sans-serif; font-size:15px; line-height:1.6; color:#3a463f;">{{ p }}</p>
              {% endfor %}

              {% if button_url %}
              <table role="presentation" cellpadding="0" cellspacing="0" border="0" style="margin:10px 0 6px;">
                <tr>
                  <td align="center" style="border-radius:6px; background-color:#0b3b29;">
                    <a href="{{ button_url }}" target="_blank" style="display:inline-block; padding:13px 30px; font-family:Helvetica,Arial,sans-serif; font-size:15px; font-weight:bold; line-height:1; color:#ffffff; text-decoration:none; border-radius:6px;">{{ button_label }}</a>
                  </td>
                </tr>
              </table>
              {% endif %}

              {% if note %}
              <p style="margin:18px 0 0; font-family:Helvetica,Arial,sans-serif; font-size:13px; line-height:1.6; color:#6a7872;">{{ note }}</p>
              {% endif %}

            </td>
          </tr>

          <!-- footer -->
          <tr>
            <td align="center" style="padding:22px 12px 4px; font-family:Helvetica,Arial,sans-serif; font-size:12px; line-height:1.5; color:#6a7872;">
              Anthea &mdash; growth &amp; marketing talent for startups
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>{% endautoescape %}
